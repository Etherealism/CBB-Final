<!DOCTYPE html>
<html lang="en">
<title>Donate - CBB</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    body,h4,h5,h6 {font-family: "Lato", sans-serif}
    h1{font-family:"Lato",sans-serif; font-weight: bold}
    h7{font-family: "Lato", sans-serif; font-size: 23px; font-weight: bold}
    .w3-bar,h1,button {font-family: "Montserrat", sans-serif}
    html {
        background: rgb(64, 64, 64) no-repeat center center fixed;
        -webkit-background-size: cover;
        -moz-background-size: cover;
        -o-background-size: cover;
        background-size: cover;
    }
    h3{
        font-size:260%;
        text-shadow: 0 10px 10px rgb(0, 0, 0);
        text-align:left;
        position: relative;
        left: 0px;
        color:white;
        margin-bottom: 5px;
        font-family:"Century Gothic"}
    h2{
        font-size:305%;
        text-shadow: 0 10px 10px rgb(0, 0, 0);
        font-weight: bold;
        position: relative;
        /*left: 10px;*/
        text-align:center;
        color: rgb(255, 255, 255);
        font-family:"Century Gothic"}
    label {
        display: inline-block;
        width: 140px;
        text-align: left;
        position: relative;
        left: 60px;
    }
    input {
        display: inline-block;
        width: 250px;
        text-align: left;
        position: relative;
        border: none;
        border-radius: 5px;
        left: 60px;
    }
    select {
        display: inline-block;
        width: 250px;
        text-align: center;
        position: relative;
        border: none;
        border-radius: 5px;
        left: 60px;
    }
    .header-img {
        width: 100%;
        height: 200px;
        background:url("blood.jpg")no-repeat center center fixed;;
        background-size: cover;
    }

    .main{
        background-color: rgb(239, 239, 239);
        margin-left: 40px;
        margin-right: 40px;
        margin-bottom: -15px;
        border-radius:10px;
        font-size:40;
        padding:  10;
        font-weight:bold;
        box-shadow: 0 10px 10px rgba(0, 0, 0, 0.15);}
    .row{
        display: table-row;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: -130px;
    }
    .row label{
        display:table-cell;
        padding:2px,40px;
        color: rgb(16, 0, 0);
    }

    .row input{
        display:table-cell;
        border: none;
        border-radius: 5px;
        padding:10px;
    }
    input-box{
        display: flex;
        text-align: center;
        align-items: center;
        justify-content: center;
        margin-left: 300px;
        margin-top: 20px;
    }
    .input-box input[type="submit"]{
        background: linear-gradient(to top, rgb(243, 67, 54) 0%, rgb(243, 67, 54) 100%);
        font-size: 17px;
        margin:0 auto;
        display:block;
        font-weight: bold;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 18px;
        text-align: center;
        border: none;
    }

    .input-box input[type="submit"]:hover{
        letter-spacing: 1px;
        color: #000000;
        background: linear-gradient(to bottom, rgba(222, 215, 215, 0.97) 0%, rgba(42, 41, 41, 0.7) 100%);
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    #footer{
        color: #ffffff;
        /*background-color: #134370;*/
        margin-top:25px;
        height:5px;
        clear:both;
        border-radius:5px;
        text-align:center;
        padding:15px;
        font-size:90%;
    }
</style>
<body>

<div id="navbar">
    <div class="w3-bar w3-red w3-card w3-left-align w3-large">
        <a href="homepage.html" class="w3-bar-item w3-button w3-wide"><img src ="pngaaa.com-5280690.png" alt="" width="45" height="48"style="vertical-align:middle;margin:-10px 20px"><h7>Community Blood Bank</h7></a>
        <div class="w3-right w3-hide-small">
            <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right w3-padding-large w3-hover-white w3-large w3-red" href="javascript:void(0);" onclick="myFunction()" title="Toggle Navigation Menu"><i class="fa fa-bars"></i></a>
            <a href="homepage.html" class="wbutton w3-3-bar-item w3-button w3-padding-large w3-hover-white">Home</a>
            <a href="donateform.html" class="w3-bar-item w3-hide-small w3-padding-large w3-white"style="text-decoration:none">Donor</a>
            <a href="requestform.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white">Request</a>
            <a href="aboutus.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white">About Us</a>
            <a href="login.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white">Admin</a>
        </div>
    </div>
    <div id="header">
        <div class=header-img </div>
    <br>
    <br>
    <h2>DONOR'S INFORMATION</h2>
</div>

<div class="main">

    <form id="theForm" method="">
        <p>
            <br>
        <div class="row">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Name" required>
            </br> </br>
        </div>

        <div class="row">
            <label for="phone">Phone No.:</label>
            <input type="number" id="phone" name="cnum" placeholder="Phone No." required> </br> </br>
        </div>

        <div class="row">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email" required> </br> </br>
        </div>

        <div class="row">
            <label for="address">Address:</label>
            <input type="text" id="address" name="addr" placeholder="House No./Street" required> </br> </br>
        </div>
        <p>

        <div class="row">
            <label for="blood type">Blood Type:</label>
            <select name="blood type" id="blood type" name="btype" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select> </br> </br>
        </div>
        <div class="row">
            <label for="blood amount">Blood Packs:</label>
            <input type="text" id="blood amount" name="bpacks" size="20" maxlength="50" placeholder="Enter Amount"> </br> </br>
        </div>
        <div class="row">
            <label for="appointment date">Request Date:</label>
            <input type="date" id="appointment date" name="apdate" required> </br> </br>
        </div>
        <br>
        <br>
        <div class="input-box button">
            <input type="submit" name="" value="Submit">
            </p>
        </div>
        <div id="footer"><br>
            &copy; 2022. CBB.com. All Rights Reserved
        </div>
</body>
</html>
